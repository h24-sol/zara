<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZARA | SOVEREIGN INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');
        body { background: #020205; color: #00f2ff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .glass { background: rgba(0, 242, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.1); }
        .glow-text { text-shadow: 0 0 15px rgba(0, 242, 255, 0.6); }
        .zara-avatar { filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.3)); border: 2px solid rgba(0, 242, 255, 0.2); transition: 0.5s; }
        .speaking-pulse { animation: pulse-border 1.5s infinite; filter: drop-shadow(0 0 50px rgba(0, 242, 255, 0.6)); }
        @keyframes pulse-border { 0%, 100% { border-color: rgba(0, 242, 255, 0.2); } 50% { border-color: #00f2ff; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-6">

    <nav class="p-5 border-b border-white/5 flex justify-between items-center glass rounded-t-3xl">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black tracking-[0.3em] uppercase Orbitron glow-text leading-none">ZARA <span class="text-white">v5.0</span></h1>
            <p class="text-[10px] tracking-[0.4em] opacity-40 font-bold mt-1 uppercase">Sovereign Intelligence Network</p>
        </div>
        <div class="flex gap-2">
            <button id="btn-en" onclick="setLang('en')" class="px-4 py-1 rounded-full border border-cyan-500 bg-cyan-500 text-black text-xs font-bold transition-all">EN</button>
            <button id="btn-bn" onclick="setLang('bn')" class="px-4 py-1 rounded-full border border-cyan-500 text-cyan-500 text-xs font-bold transition-all hover:bg-cyan-500/20">BN</button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden border-x border-white/5 bg-black/20">
        <div class="w-full md:w-5/12 flex flex-col items-center justify-center p-8 relative">
            <div id="avatar-frame" class="zara-avatar w-64 h-80 md:w-72 md:h-96 rounded-3xl overflow-hidden bg-zinc-900 shadow-2xl relative">
                <img src="https://images.unsplash.com/photo-1620712943543-bcc4688e7485?auto=format&fit=crop&q=80&w=800" 
                     class="w-full h-full object-cover grayscale brightness-75 hover:grayscale-0 hover:brightness-100 transition-all duration-1000" alt="ZARA Visual">
                <div class="absolute inset-0 bg-cyan-500/5 pointer-events-none"></div>
            </div>
            <div class="mt-8 text-center max-w-sm">
                <p id="zara-speech" class="text-xl italic font-light text-cyan-100 opacity-80 leading-relaxed drop-shadow-md">
                    "Global surveillance active. Awaiting your query."
                </p>
            </div>
        </div>

        <div class="w-full md:w-7/12 p-6 md:p-10 overflow-y-auto">
            <div id="intel-display" class="space-y-6">
                <div class="glass p-8 rounded-3xl border-l-4 border-l-cyan-500 shadow-xl">
                    <h3 id="panel-title" class="text-[10px] tracking-[0.5em] text-cyan-400 mb-4 font-bold uppercase opacity-70">Strategic Analysis</h3>
                    <div id="intel-output" class="text-lg opacity-80 font-light leading-relaxed text-blue-50">
                        System standing by. Enter a command to interrogate the global news grid...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 md:p-8 glass border-t border-white/5 rounded-b-3xl">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row gap-4">
